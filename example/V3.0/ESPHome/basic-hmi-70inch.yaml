esphome:
  name: basic-hmi-70inch
  friendly_name: Basic_HMI_7.0inch
  platformio_options:                                        # Custom PlatformIO build configuration
    build_flags: 
      - "-DBOARD_HAS_PSRAM"                                  # Enable PSRAM support in compilation
    board_build.esp-idf.memory_type: qio_opi                 # Set memory type for ESP-IDF framework
    board_build.flash_mode: dio                              # Set SPI flash access mode to DIO

  on_boot:                                                   # Actions to execute during boot phase
    priority: 600                                            # High priority to run before most components
    then: 
      - lambda: |- 
          uint8_t addr = 0x18;                               // PCA9557 I2C expander slave address
          
          uint8_t config[2] = {0x03, 0x00};                  // 1. Set all PCA9557 pins as outputs
          id(bus_a).write(addr, config, 2);                  // Write configuration via I2C bus
          
          uint8_t output_low[2] = {0x01, 0x00};              // 2. IO0=LOW, IO1=LOW (Hard reset GT911)
          id(bus_a).write(addr, output_low, 2);              // Apply low signals to reset pins
          
          delay(20);                                         // 3. Hold reset state for 20 milliseconds
          
          uint8_t output_high[2] = {0x01, 0x01};             // 4. IO0=HIGH (Release GT911 reset sequence)
          id(bus_a).write(addr, output_high, 2);             // Apply high signal to wake up touch IC
          
          delay(100);                                        // 5. Wait 100ms for touch IC to initialize
          
          uint8_t config_input[2] = {0x03, 0x02};            // 6. Set IO1 as input for GT911 interrupt
          id(bus_a).write(addr, config_input, 2);            // Finalize PCA9557 pin configuration

esp32:                                                       # ESP32 specific hardware configuration
  board: esp32s3box                                          # Base board model for ESP32-S3
  framework: 
    type: esp-idf                                            # Use official ESP-IDF framework, not Arduino
    sdkconfig_options: 
      CONFIG_ESP32S3_DEFAULT_CPU_FREQ_240: y                 # Set CPU frequency to max (240MHz)
      CONFIG_ESP32S3_DATA_CACHE_64KB: y                      # Allocate 64KB for data cache
      CONFIG_SPIRAM_FETCH_INSTRUCTIONS: y                    # Allow instruction fetch from SPIRAM
      CONFIG_SPIRAM_RODATA: y                                # Store read-only data in SPIRAM
      CONFIG_SPIRAM_USE: y                                   # Enable external SPIRAM globally
      CONFIG_SPIRAM_SPEED_80M: y                             # Set SPIRAM clock speed to 80MHz
      CONFIG_SPIRAM_MODE_OCT: y                              # Use Octal mode for faster RAM access
      CONFIG_ESP32S3_SPIRAM_SUPPORT: y                       # Enable ESP32-S3 specific SPIRAM support
  variant: esp32s3                                           # Specify the chip variant exactly

psram:                                                       # Physical PSRAM configuration block
  mode: octal                                                # Octal SPI mode matches board layout
  speed: 80MHz                                               # 80MHz speed matches sdkconfig options

# Enable logging
logger:

